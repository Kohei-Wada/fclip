# fclip configuration
# Place this file at:
#   %APPDATA%\fclip\config.toml  (e.g. C:\Users\<user>\AppData\Roaming\fclip\config.toml)

[hotkey]
open = "Ctrl+Shift+V"

[behavior]
max_history = 1000

[theme]
mode = "system"              # "dark", "light", or "system" (follows OS preference at startup)

[keybindings]
select = "Enter"
close = "Escape"
delete = "Ctrl+d"
next = "Ctrl+n,Ctrl+j"      # comma-separated for multiple bindings
prev = "Ctrl+p,Ctrl+k"
backspace = "Ctrl+h"
clear = "Ctrl+u"
toggle_theme = "Ctrl+t"
